<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Talent Acquisition Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { padding-top: 2rem; }
        .card { margin-bottom: 1.5rem; }
    </style>
</head>
<body>
    <div class="container">
        <header class="pb-3 mb-4 border-bottom">
            <span class="fs-4">Cyber Talent Acquisition - NICE Framework Alignment</span>
        </header>
        <div class="row">
            <div class="col-md-6">
                <h2>Available Work Roles</h2>
                <div id="work-roles-list"></div>
            </div>
            <div class="col-md-6">
                <h2>Recent Candidates</h2>
                <div id="candidates-list"></div>
            </div>
        </div>
        <div class="row mt-4">
            <div class="col-12">
                <h2>Post a New Job</h2>
                <form id="job-form">
                    <div class="mb-3">
                        <label for="job-title" class="form-label">Job Title</label>
                        <input type="text" class="form-control" id="job-title" required>
                    </div>
                    <div class="mb-3">
                        <label for="work-role-select" class="form-label">NICE Work Role</label>
                        <select class="form-select" id="work-role-select"></select>
                    </div>
                    <button type="submit" class="btn btn-primary">Create Posting</button>
                </form>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
